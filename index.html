<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打球名單</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --danger: #dc2626;
      --ok: #059669;
      --fixed: #f59e0b;
      --male: #2563eb;
      --female: #db2777;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,.04);
      margin-bottom: 16px;
    }
    h1, h2 { margin: 0 0 12px; }
    .sub { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 12px;
    }
    .stats-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 12px;
    }
    .stat {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #fafafa;
    }
    .label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .value { font-size: 28px; font-weight: 700; }
    .male { color: var(--male); }
    .female { color: var(--female); }

    form { display: grid; gap: 12px; }
    input, button, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 16px;
      background: white;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }
    button:disabled { opacity: .6; cursor: not-allowed; }

    .row2, .row3 {
      display: grid;
      gap: 12px;
    }
    .row2 { grid-template-columns: repeat(2, 1fr); }
    .row3 { grid-template-columns: repeat(3, 1fr); }

    ul { list-style: none; padding: 0; margin: 0; }
    li.member {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    li.member:last-child { border-bottom: none; }

    .member-info { display: flex; flex-direction: column; gap: 4px; }
    .member-name {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .member-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
    }
    .badge-fixed { background: #fff7ed; color: #b45309; border-color: #fed7aa; }
    .badge-male { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .badge-female { background: #fdf2f8; color: #be185d; border-color: #fbcfe8; }

    .mini-btn {
      width: auto;
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid #fecaca;
      background: #fff5f5;
      color: var(--danger);
    }

    .msg { margin-top: 10px; font-size: 14px; min-height: 20px; }
    .ok { color: var(--ok); }
    .err { color: var(--danger); }
    .hint { color: var(--muted); font-size: 13px; }
    .footer-note { color: var(--muted); font-size: 13px; margin-top: 8px; }

    @media (max-width: 760px) {
      .stats, .stats-2, .row2, .row3 { grid-template-columns: 1fr; }
      .value { font-size: 24px; }
      li.member { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="eventTitle">讀取中...</h1>
      <div class="sub" id="eventInfo">正在載入活動資料</div>
      <div class="stats">
        <div class="stat">
          <div class="label">目前總人數</div>
          <div class="value" id="countNow">-</div>
        </div>
        <div class="stat">
          <div class="label">總名額</div>
          <div class="value" id="countMax">-</div>
        </div>
        <div class="stat">
          <div class="label">剩餘空缺</div>
          <div class="value" id="countLeft">-</div>
        </div>
        <div class="stat">
          <div class="label">固定名單</div>
          <div class="value" id="countFixed">-</div>
        </div>
      </div>
      <div class="stats-2">
        <div class="stat">
          <div class="label">男生名單</div>
          <div class="value male" id="countMale">-</div>
        </div>
        <div class="stat">
          <div class="label">女生名單</div>
          <div class="value female" id="countFemale">-</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>目前名單</h2>
      <ul id="memberList"></ul>
      <div class="footer-note">固定名單會特別標示，一般名單可快速取消。</div>
    </div>

    <div class="card">
      <h2>加入名單</h2>
      <form id="joinForm">
        <div class="row3">
          <input type="text" id="name" placeholder="要加入的姓名 / 暱稱" required />
          <select id="gender" required>
            <option value="">請選擇性別</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
          <input type="text" id="phone" placeholder="聯絡方式（可選）" />
        </div>
        <div class="row2">
          <input type="text" id="createdBy" placeholder="報名人（本人就填自己）" required />
          <input type="text" id="note" placeholder="備註（可選）" />
        </div>
        <button type="submit" id="joinBtn">加入名單</button>
        <div class="hint">加入成功後，系統會顯示取消碼。請自行保存。</div>
        <div class="msg" id="joinMsg"></div>
      </form>
    </div>

    <div class="card">
      <h2>快速取消報名</h2>
      <form id="leaveForm">
        <div class="row2">
          <input type="text" id="leaveName" placeholder="姓名 / 暱稱" required />
          <input type="text" id="cancelCode" placeholder="取消碼" required />
        </div>
        <button type="submit" class="secondary" id="leaveBtn">取消報名</button>
        <div class="hint">固定名單不可由前台取消。</div>
        <div class="msg" id="leaveMsg"></div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby7afp_GPuKpsLEvcU058CYq8LBMxAgURFvcVPBGuc92Om61eKVOyVqI8TBxlCB-y3l/exec";

    async function api(action, payload = {}) {
      const url = `${API_URL}?action=${encodeURIComponent(action)}`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      return await res.json();
    }

    function renderRoster(data) {
      const event = data.event || {};
      const members = data.members || [];
      const max = Number(event.maxPlayers || 0);
      const now = members.length;
      const left = Math.max(max - now, 0);
      const male = members.filter(m => m.gender === "男").length;
      const female = members.filter(m => m.gender === "女").length;
      const fixed = members.filter(m => m.isFixed === true || String(m.isFixed).toUpperCase() === "TRUE").length;

      document.getElementById("eventTitle").textContent = event.title || "打球名單";
      document.getElementById("eventInfo").textContent =
        `${event.date || ""} ${event.time || ""} ${event.location ? "｜" + event.location : ""}`.trim();

      document.getElementById("countNow").textContent = now;
      document.getElementById("countMax").textContent = max;
      document.getElementById("countLeft").textContent = left;
      document.getElementById("countMale").textContent = male;
      document.getElementById("countFemale").textContent = female;
      document.getElementById("countFixed").textContent = fixed;

      const list = document.getElementById("memberList");
      list.innerHTML = "";

      if (!members.length) {
        list.innerHTML = '<li class="member"><div class="member-info"><div class="member-name">目前還沒有人</div></div></li>';
        return;
      }

      members.forEach((m, idx) => {
        const li = document.createElement("li");
        li.className = "member";

        const genderClass = m.gender === "女" ? "badge-female" : "badge-male";
        const fixedHtml = m.isFixed ? '<span class="badge badge-fixed">固定名單</span>' : '';
        const cancelBtn = m.isFixed ? '' : `<button class="mini-btn" onclick="quickCancel('${encodeURIComponent(m.name || "")}')">快速取消</button>`;

        li.innerHTML = `
          <div class="member-info">
            <div class="member-name">
              <span>${idx + 1}. ${escapeHtml(m.name || "")}</span>
              <span class="badge ${genderClass}">${escapeHtml(m.gender || "-")}</span>
              ${fixedHtml}
            </div>
            <div class="member-note">
              ${m.phone ? `聯絡：${escapeHtml(m.phone)}　` : ""}
              ${m.note ? `備註：${escapeHtml(m.note)}　` : ""}
              報名人：${escapeHtml(m.createdBy || "未記錄")}
            </div>
            <div class="member-note">加入時間：${escapeHtml(m.createdAt || "")}</div>
          </div>
          <div>${cancelBtn}</div>
        `;
        list.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showMsg(id, text, ok = true) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${ok ? "ok" : "err"}`;
    }

    async function loadRoster() {
      try {
        const data = await api("getRoster");
        if (!data.ok) throw new Error(data.message || "讀取失敗");
        renderRoster(data);
      } catch (e) {
        document.getElementById("eventTitle").textContent = "載入失敗";
        document.getElementById("eventInfo").textContent = e.message;
      }
    }

    async function quickCancel(name) {
      const decodedName = decodeURIComponent(name);
      const code = prompt(`請輸入 ${decodedName} 的取消碼`);
      if (!code) return;

      try {
        const data = await api("leave", { name: decodedName, cancelCode: code.trim() });
        if (!data.ok) throw new Error(data.message || "取消失敗");
        showMsg("leaveMsg", data.message || "已取消", true);
        renderRoster(data);
      } catch (e) {
        showMsg("leaveMsg", e.message, false);
      }
    }

    document.getElementById("joinForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("joinBtn");
      btn.disabled = true;
      showMsg("joinMsg", "送出中...", true);

      try {
        const payload = {
          name: document.getElementById("name").value.trim(),
          gender: document.getElementById("gender").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          createdBy: document.getElementById("createdBy").value.trim(),
          note: document.getElementById("note").value.trim(),
        };
        const data = await api("join", payload);
        if (!data.ok) throw new Error(data.message || "加入失敗");

        let text = data.message || "加入成功";
        if (data.cancelCode) text += `，取消碼：${data.cancelCode}`;
        showMsg("joinMsg", text, true);

        document.getElementById("joinForm").reset();
        renderRoster(data);
      } catch (e) {
        showMsg("joinMsg", e.message, false);
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById("leaveForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("leaveBtn");
      btn.disabled = true;
      showMsg("leaveMsg", "處理中...", true);

      try {
        const payload = {
          name: document.getElementById("leaveName").value.trim(),
          cancelCode: document.getElementById("cancelCode").value.trim(),
        };
        const data = await api("leave", payload);
        if (!data.ok) throw new Error(data.message || "取消失敗");
        showMsg("leaveMsg", data.message || "已取消報名", true);
        document.getElementById("leaveForm").reset();
        renderRoster(data);
      } catch (e) {
        showMsg("leaveMsg", e.message, false);
      } finally {
        btn.disabled = false;
      }
    });

    loadRoster();
  </script>
</body>
</html>
